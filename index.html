<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PORTRAIT · 聖經人物深度研究</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #B8962E;
    --gold-light: #D4AF5A;
    --gold-pale: #F5EDD5;
    --gold-faint: #FAF6EC;
    --ink: #1A1610;
    --ink-mid: #3D3525;
    --ink-soft: #6B5E42;
    --ink-pale: #9C8E72;
    --parchment: #F7F2E8;
    --parchment-dark: #EDE5D0;
    --sand: #E8DFC8;
    --teal-deep: #1A4A3E;
    --border: rgba(184,150,46,0.25);
    --border-strong: rgba(184,150,46,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--parchment);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    line-height: 1.8;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    background: var(--ink);
    padding: 72px 24px 56px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(184,150,46,0.05) 39px, rgba(184,150,46,0.05) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(184,150,46,0.05) 39px, rgba(184,150,46,0.05) 40px);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-family: 'IM Fell English', serif;
    font-size: 12px;
    letter-spacing: 0.35em;
    color: var(--gold);
    margin-bottom: 20px;
    opacity: 0.85;
  }
  .hero-title {
    font-family: 'IM Fell English', serif;
    font-size: clamp(40px, 9vw, 80px);
    color: #fff;
    letter-spacing: 0.08em;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .hero-title-zh {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(13px, 2.5vw, 17px);
    font-weight: 300;
    color: var(--gold-light);
    letter-spacing: 0.25em;
    margin-bottom: 28px;
  }
  .hero-desc {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(13px, 2vw, 15px);
    color: var(--sand);
    max-width: 560px;
    margin: 0 auto 36px;
    line-height: 2;
    opacity: 0.85;
  }
  .hero-stats {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
  .hero-stat { text-align: center; }
  .hero-stat-num {
    font-family: 'IM Fell English', serif;
    font-size: 28px;
    color: var(--gold);
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .hero-stat-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--ink-pale);
  }
  .hero-divider {
    width: 40px; height: 1px;
    background: var(--gold);
    margin: 36px auto 0;
    opacity: 0.4;
  }

  /* ── FILTER BAR ── */
  .filter-wrap {
    background: var(--ink-mid);
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  /* Primary tabs */
  .filter-primary {
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 0 16px;
    border-bottom: 1px solid rgba(184,150,46,0.12);
  }
  .filter-primary::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex-shrink: 0;
    background: none;
    border: none;
    color: var(--ink-pale);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.1em;
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    white-space: nowrap;
  }
  .tab-btn:hover { color: var(--gold-light); }
  .tab-btn.active {
    color: var(--gold-light);
    border-bottom-color: var(--gold);
  }

  /* Secondary MBTI sub-filter */
  .filter-secondary {
    display: none;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 8px 16px;
    gap: 6px;
    flex-wrap: nowrap;
  }
  .filter-secondary::-webkit-scrollbar { display: none; }
  .filter-secondary.visible { display: flex; }

  .mbti-pill {
    flex-shrink: 0;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(184,150,46,0.2);
    border-radius: 20px;
    color: var(--ink-pale);
    font-family: 'IM Fell English', serif;
    font-size: 12px;
    letter-spacing: 0.05em;
    padding: 4px 14px;
    cursor: pointer;
    transition: all 0.18s;
    white-space: nowrap;
  }
  .mbti-pill:hover { color: var(--gold-light); border-color: var(--gold); }
  .mbti-pill.active {
    background: rgba(184,150,46,0.15);
    border-color: var(--gold);
    color: var(--gold-light);
  }

  /* ── MAIN CONTENT ── */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Category label */
  .section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .section-label-text {
    font-family: 'Noto Serif TC', serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    letter-spacing: 0.1em;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
  .section-count {
    font-family: 'IM Fell English', serif;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.05em;
  }

  /* ── CARDS GRID ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .char-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 22px 18px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    display: block;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s;
    position: relative;
    overflow: hidden;
  }
  .char-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
  }
  .char-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 28px rgba(26,22,16,0.1);
    border-color: var(--border-strong);
  }
  .char-card:hover::before { transform: scaleX(1); }

  .char-card-top {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }
  .char-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: var(--gold-pale);
    border: 1px solid var(--border-strong);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    color: var(--gold);
    flex-shrink: 0;
  }
  .char-name-block { flex: 1; min-width: 0; }
  .char-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 2px;
    letter-spacing: 0.03em;
  }
  .char-name-en {
    font-family: 'IM Fell English', serif;
    font-size: 12px;
    color: var(--ink-pale);
    letter-spacing: 0.08em;
  }
  .char-desc {
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.85;
    margin-bottom: 14px;
  }
  .char-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .char-tag {
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 2px 9px;
    border-radius: 20px;
    border: 1px solid rgba(184,150,46,0.25);
    color: var(--gold);
    background: var(--gold-faint);
  }
  .char-tag.mbti {
    background: rgba(26,74,62,0.07);
    border-color: rgba(26,74,62,0.25);
    color: var(--teal-deep);
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--ink-pale);
    display: none;
  }
  .empty-state.visible { display: block; }
  .empty-state-icon {
    font-family: 'IM Fell English', serif;
    font-size: 48px;
    color: var(--border-strong);
    display: block;
    margin-bottom: 16px;
  }

  /* ── GENEALOGY ── */
  .genealogy-notice {
    background: var(--teal-deep);
    border-radius: 12px;
    padding: 32px 28px;
    color: var(--sand);
    text-align: center;
    display: none;
  }
  .genealogy-notice.visible { display: block; }
  .genealogy-notice h3 {
    font-family: 'Noto Serif TC', serif;
    font-size: 18px;
    font-weight: 400;
    color: var(--gold-light);
    margin-bottom: 10px;
    letter-spacing: 0.05em;
  }
  .genealogy-notice p {
    font-size: 14px;
    color: var(--sand);
    opacity: 0.8;
    line-height: 1.9;
  }

  /* ── FOOTER ── */
  .footer {
    background: var(--ink);
    color: var(--ink-pale);
    text-align: center;
    padding: 28px;
    font-size: 11px;
    letter-spacing: 0.12em;
  }
  .footer span { color: var(--gold); }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .hero { padding: 52px 20px 44px; }
    .hero-stats { gap: 24px; }
    .main { padding: 28px 16px 60px; }
    .cards-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .char-card { padding: 16px 14px 14px; }
    .char-avatar { width: 40px; height: 40px; font-size: 15px; }
    .char-name { font-size: 15px; }
    .char-desc { font-size: 12px; }
    .tab-btn { font-size: 11px; padding: 13px 12px; }
  }
  @media (max-width: 380px) {
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-eyebrow">PORTRAIT · BIBLE CHARACTERS</div>
  <h1 class="hero-title">Portrait</h1>
  <div class="hero-title-zh">聖經人物深度研究</div>
  <p class="hero-desc">
    每一位聖經人物，都是神救贖計劃中的一個章節。<br>
    透過他們的生命，看見自己；透過自己，更理解聖經的大敘事。
  </p>
  <div class="hero-stats">
    <div class="hero-stat">
      <span class="hero-stat-num" id="stat-total">1</span>
      <span class="hero-stat-label">人物總數</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-num">8</span>
      <span class="hero-stat-label">研究維度</span>
    </div>
    <div class="hero-stat">
      <span class="hero-stat-num">16</span>
      <span class="hero-stat-label">MBTI 類型</span>
    </div>
  </div>
  <div class="hero-divider"></div>
</div>

<!-- FILTER BAR -->
<div class="filter-wrap">
  <div class="filter-primary">
    <button class="tab-btn active" data-tab="ot">舊約人物</button>
    <button class="tab-btn" data-tab="nt">新約人物</button>
    <button class="tab-btn" data-tab="mbti">MBTI 16型</button>
    <button class="tab-btn" data-tab="genealogy">主耶穌家譜</button>
  </div>
  <div class="filter-secondary" id="mbti-sub">
    <button class="mbti-pill active" data-mbti="all">全部</button>
    <button class="mbti-pill" data-mbti="INTJ">INTJ</button>
    <button class="mbti-pill" data-mbti="INTP">INTP</button>
    <button class="mbti-pill" data-mbti="ENTJ">ENTJ</button>
    <button class="mbti-pill" data-mbti="ENTP">ENTP</button>
    <button class="mbti-pill" data-mbti="INFJ">INFJ</button>
    <button class="mbti-pill" data-mbti="INFP">INFP</button>
    <button class="mbti-pill" data-mbti="ENFJ">ENFJ</button>
    <button class="mbti-pill" data-mbti="ENFP">ENFP</button>
    <button class="mbti-pill" data-mbti="ISTJ">ISTJ</button>
    <button class="mbti-pill" data-mbti="ISFJ">ISFJ</button>
    <button class="mbti-pill" data-mbti="ESTJ">ESTJ</button>
    <button class="mbti-pill" data-mbti="ESFJ">ESFJ</button>
    <button class="mbti-pill" data-mbti="ISTP">ISTP</button>
    <button class="mbti-pill" data-mbti="ISFP">ISFP</button>
    <button class="mbti-pill" data-mbti="ESTP">ESTP</button>
    <button class="mbti-pill" data-mbti="ESFP">ESFP</button>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <div class="section-label">
    <span class="section-label-text" id="section-label-text">舊約人物</span>
    <span class="section-count" id="section-count">— 1 人物</span>
  </div>

  <div class="genealogy-notice" id="genealogy-notice">
    <h3>主耶穌家譜 · 馬太福音 1 章</h3>
    <p>
      從亞伯拉罕到大衛，從大衛到被擄巴比倫，從被擄到基督降生——<br>
      家譜不只是名單，而是神在歷史中守約的見證。
    </p>
  </div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="empty-state" id="empty-state">
    <span class="empty-state-icon">∅</span>
    <p>此分類尚未收錄人物，敬請期待。</p>
  </div>


</main>

<!-- FOOTER -->
<div class="footer">
  PORTRAIT 聖經人物深度研究 · <span>透過人物，理解聖經大敘事</span>
</div>

<script>
// ══════════════════════════════════════════
// DATA · 人物資料庫
// 新增人物：在 CHARACTERS 陣列加一個物件
//
// 欄位說明：
//   id        唯一識別碼（英文小寫，用於未來擴充）
//   name      中文名
//   nameEn    英文名
//   avatar    顯示在圓形頭像的字（通常取中文名第一字）
//   desc      一句話描述（20–40字，顯示在卡片上）
//   mbti      MBTI 類型字串，例 "INFJ"
//   tags      額外標籤陣列，例 ["信心之父", "立約先祖"]
//   file      對應 HTML 檔名，例 "abraham_portrait.html"
//   categories 此人物所屬清單，可多選：
//              "ot"（舊約）、"nt"（新約）、"mbti"（MBTI）、"genealogy"（家譜）
// ══════════════════════════════════════════
const CHARACTERS = [
  {
    id: "abraham",
    name: "亞伯拉罕",
    nameEn: "Abraham",
    avatar: "亞",
    desc: "神叫他走，他就走了——連目的地也不知道。七十五歲踏入荒野，成為信心的原型",
    mbti: "INFJ",
    tags: ["信心之父", "諸民之父"],
    file: "abraham_portrait.html",
    categories: ["ot", "mbti","genealogy"]
  },
  {
    id: "cornelius",
    name: "哥尼流",
    nameEn: "Cornelius",
    avatar: "流",
    desc: "一生忠誠於兩個不接受彼此的世界——帝國的劍與天國的禱告——直到有一天，神親自拆毀了那道牆",
    mbti: "ISTJ",
    tags: ["羅馬百夫長", "外邦宣教先驅"],
    file: "cornelius_portrait.html",
    categories: ["nt", "mbti"]
  },
  {
    id: "isaac",
    name: "以撒",
    nameEn: "Isaac",
    avatar: "撒",
    desc: "是神用笑聲命名的孩子，卻一生背負著刀刃的陰影——活下來，是他最大的使命，也是最沉重的重量",
    mbti: "ISFJ",
    tags: ["應許之子", "立約承繼者"],
    file: "isaac_portrait.html",
    categories: ["ot", "mbti","genealogy"]
  },
  // ── 以下為示範空白條目，實際填入後刪除 ──
  // {
  //   id: "moses",
  //   name: "摩西",
  //   nameEn: "Moses",
  //   avatar: "摩",
  //   desc: "從王宮到曠野，從殺人逃亡到帶領民族出埃及，神的呼召不因人的失敗而終止。",
  //   mbti: "INFJ",
  //   tags: ["律法頒布者", "民族領袖"],
  //   file: "moses_portrait.html",
  //   categories: ["ot", "mbti", "genealogy"]
  // },
  // {
  //   id: "david",
  //   name: "大衛",
  //   nameEn: "David",
  //   avatar: "大",
  //   desc: "牧羊少年、詩人、戰士、王、姦夫——他是整本詩篇的心跳，也是神心意中的人。",
  //   mbti: "ENFP",
  //   tags: ["合神心意的人", "大衛之約"],
  //   file: "david_portrait.html",
  //   categories: ["ot", "mbti", "genealogy"]
  // },
  // {
  //   id: "paul",
  //   name: "保羅",
  //   nameEn: "Paul",
  //   avatar: "保",
  //   desc: "迫害教會的法利賽人，在大馬士革路上被翻轉，成為外邦人的使徒與神學建構者。",
  //   mbti: "ENTJ",
  //   tags: ["外邦使徒", "書信作者"],
  //   file: "paul_portrait.html",
  //   categories: ["nt", "mbti"]
  // },
];

// ══════════════════════════════════════════
// APP LOGIC（不需修改）
// ══════════════════════════════════════════
const LABELS = { ot: "舊約人物", nt: "新約人物", mbti: "MBTI 16型", genealogy: "主耶穌家譜" };

let currentTab = "ot";
let currentMbti = "all";

function updateStatTotal() {
  document.getElementById("stat-total").textContent = CHARACTERS.length;
}

function renderCards() {
  const grid = document.getElementById("cards-grid");
  const empty = document.getElementById("empty-state");
  const geno  = document.getElementById("genealogy-notice");
  const labelText = document.getElementById("section-label-text");
  const countEl   = document.getElementById("section-count");

  grid.innerHTML = "";
  empty.classList.remove("visible");
  geno.classList.remove("visible");
  grid.style.display = "grid";

  labelText.textContent = LABELS[currentTab];

	if (currentTab === "genealogy") {
	  geno.classList.add("visible");
	  geno.style.marginBottom = "16px";
	}

	let filtered = CHARACTERS.filter(c => c.categories.includes(currentTab));
	if (currentTab === "mbti" && currentMbti !== "all") {
	  filtered = filtered.filter(c => c.mbti === currentMbti);
	}

  countEl.textContent = `— ${filtered.length} 人物`;

  if (filtered.length === 0) {
    grid.style.display = "none";
    empty.classList.add("visible");
    return;
  }

  filtered.forEach(c => {
    const card = document.createElement("a");
    card.className = "char-card";
    card.href = c.file;

    const tagsHTML = c.tags.map(t => `<span class="char-tag">${t}</span>`).join("");
    const mbtiTag  = c.mbti ? `<span class="char-tag mbti">${c.mbti}</span>` : "";

    card.innerHTML = `
      <div class="char-card-top">
        <div class="char-avatar">${c.avatar}</div>
        <div class="char-name-block">
          <div class="char-name">${c.name}</div>
          <div class="char-name-en">${c.nameEn}</div>
        </div>
      </div>
      <div class="char-desc">${c.desc}</div>
      <div class="char-tags">${tagsHTML}${mbtiTag}</div>
    `;
    grid.appendChild(card);
  });
}

// Tab switching
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentTab = btn.dataset.tab;
    currentMbti = "all";

    const mbtiSub = document.getElementById("mbti-sub");
    if (currentTab === "mbti") {
      mbtiSub.classList.add("visible");
      document.querySelectorAll(".mbti-pill").forEach(p => p.classList.remove("active"));
      document.querySelector('.mbti-pill[data-mbti="all"]').classList.add("active");
    } else {
      mbtiSub.classList.remove("visible");
    }
    renderCards();
  });
});

// MBTI sub-filter
document.querySelectorAll(".mbti-pill").forEach(pill => {
  pill.addEventListener("click", () => {
    document.querySelectorAll(".mbti-pill").forEach(p => p.classList.remove("active"));
    pill.classList.add("active");
    currentMbti = pill.dataset.mbti;
    renderCards();
  });
});

// Init
updateStatTotal();
renderCards();
</script>
</body>
</html>
